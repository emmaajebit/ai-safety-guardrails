name: Pydantic Validators CI

on:
  push:
    branches: [ main ]
    paths:
      - 'pydantic/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'pydantic/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic pytest
    
    - name: Run tests
      run: |
        python -m pytest pydantic/ -v --cov
    
    - name: Validate models
      run: python -c "
from pydantic import safety_models
print('Pydantic safety models loaded successfully')
      "