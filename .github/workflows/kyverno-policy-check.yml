name: Kyverno Policy Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'kyverno/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'kyverno/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Kyverno CLI
      run: |
        curl -sSL https://github.com/kyverno/kyverno/releases/download/v1.12.0/kyverno-cli_v1.12.0_linux_x86_64.tar.gz | tar -xz
        sudo mv kyverno /usr/local/bin/
    
    - name: Validate Kyverno policies
      run: |
        kyverno validate kyverno/ --policy kyverno/